<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EIXO DO MAL — World Domination Terminal</title>
<style>
/* ============ DESIGN TOKENS — amber phosphor terminal, c.2003 ============ */
:root{
  --bg:#0d0d0d; --panel:#13100a; --panel2:#171307;
  --amber:#f0c040; --amber-hi:#ffd966; --amber-dim:#9c7e2c; --line:#4a3d18;
  --green:#6fdc6f; --red:#ff5a4e; --cyan:#54c8e8; --grey:#9a8f6e; --vio:#c08aff;
  --mono:'Courier New',Courier,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--amber); font-family:var(--mono);
  font-size:14px; line-height:1.45; overflow:hidden;
  text-shadow:0 0 6px rgba(240,192,64,.28);
}
/* ============ CRT LAYER (signature): scanlines + vignette ============ */
#crt{position:fixed;inset:0;pointer-events:none;z-index:50}
#crt::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(to bottom, rgba(0,0,0,.16) 0 1px, transparent 1px 3px);}
#crt::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.45) 100%);}
/* ============ DEFCON STRIP ============ */
#defcon{
  height:42px;display:flex;align-items:center;justify-content:space-between;
  gap:12px;padding:0 14px;border-bottom:1px solid var(--line);
  background:linear-gradient(to bottom,#1a1505,#0f0c04);white-space:nowrap;overflow:hidden;
}
#defcon .brand{font-weight:bold;letter-spacing:2px}
#defcon .brand small{color:var(--amber-dim);letter-spacing:1px;font-weight:normal}
#defcon .dstat b{letter-spacing:1px}
.cursor::after{content:'█';animation:blink 1.05s steps(1) infinite;margin-left:2px}
@keyframes blink{50%{opacity:0}}
.d5{color:var(--green)} .d4{color:#b9d05a} .d3{color:var(--amber)} .d2{color:#ff9a3d} .d1{color:var(--red)}
/* ============ LAYOUT ============ */
#app{
  display:grid;grid-template-columns:300px minmax(0,1fr) 300px;gap:10px;
  padding:10px;height:calc(100vh - 42px);
}
.panel{
  border:1px solid var(--line);background:var(--panel);
  display:flex;flex-direction:column;min-height:0;overflow:hidden;
}
.panel>h2{
  font-size:12px;letter-spacing:2px;color:var(--amber-hi);
  padding:6px 10px;border-bottom:1px solid var(--line);
  background:var(--panel2);font-weight:bold;
}
.panel>h2::before{content:'══ '}.panel>h2::after{content:' ══'}
#stats,#rank{overflow-y:auto;padding:8px 10px;flex:1}
#centerPanel{padding:0}
#cmdbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:8px 10px;border-bottom:1px solid var(--line);background:var(--panel2)}
#tabs{display:flex;flex-wrap:wrap;gap:4px;padding:6px 10px;border-bottom:1px solid var(--line)}
#tabContent{padding:10px;overflow-y:auto;flex:1.4;min-height:0}
.logTitle{font-size:12px;letter-spacing:2px;color:var(--amber-hi);padding:5px 10px;
  border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--panel2)}
.logTitle::before{content:'══ '}.logTitle::after{content:' ══'}
#log{flex:1;min-height:90px;overflow-y:auto;padding:6px 10px;font-size:13px}
/* ============ WIDGETS ============ */
.btn{
  font:inherit;background:transparent;color:var(--amber);
  border:1px solid var(--amber-dim);padding:1px 8px;cursor:pointer;
  text-shadow:inherit;
}
.btn:hover:not(:disabled){background:var(--amber);color:#0d0d0d;text-shadow:none}
.btn:focus-visible{outline:1px dashed var(--amber-hi);outline-offset:2px}
.btn:disabled{color:#5b4d22;border-color:#33290e;cursor:not-allowed}
.btn.warn{color:var(--red);border-color:#7a2c26}
.btn.warn:hover:not(:disabled){background:var(--red);color:#0d0d0d}
.btn.cy{color:var(--cyan);border-color:#27606f}
.btn.cy:hover:not(:disabled){background:var(--cyan);color:#0d0d0d}
.tab{font:inherit;background:transparent;color:var(--amber-dim);border:1px solid transparent;
  padding:1px 7px;cursor:pointer;letter-spacing:1px}
.tab:hover{color:var(--amber)}
.tab.on{background:var(--amber);color:#0d0d0d;text-shadow:none}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px;
  padding:4px 0;border-bottom:1px dashed #2c240e;flex-wrap:wrap}
.row .grow{flex:1;min-width:140px}
.muted{color:var(--grey)} .dim{color:var(--amber-dim)}
.g{color:var(--green)} .r{color:var(--red)} .c{color:var(--cyan)} .v{color:var(--vio)}
.sec{margin:10px 0 4px;color:var(--amber-hi);letter-spacing:1px}
.sec::before{content:'── '}.sec::after{content:' ──'}
.kv{display:flex;justify-content:space-between;gap:6px}
.bar{letter-spacing:0}
/* log entries */
.le{padding:1px 0;animation:fadein .25s ease}
@keyframes fadein{from{opacity:0;transform:translateY(-2px)}to{opacity:1}}
.le .tt{color:#6b5a2a;margin-right:6px}
.le.eco{color:var(--green)} .le.war{color:var(--red)} .le.spy{color:var(--cyan)}
.le.diplo{color:var(--vio)} .le.sys{color:var(--grey)} .le.nuke{color:#ffdf6b;font-weight:bold}
/* ranking */
.rrow{display:flex;gap:6px;align-items:baseline;padding:3px 0;border-bottom:1px dashed #2c240e}
.rrow .pos{width:22px;color:var(--amber-dim)}
.rrow .nn{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rrow .sc{color:var(--amber-hi)}
.rrow.me .nn{color:var(--amber-hi);font-weight:bold}
.rrow.dead{color:#4d4434;text-decoration:line-through}
.rrow.dead .sc{color:#4d4434}
/* ============ OVERLAYS ============ */
.overlay{position:fixed;inset:0;z-index:40;background:rgba(10,9,3,.96);
  display:flex;align-items:center;justify-content:center;padding:18px;overflow-y:auto}
.overlay.hidden{display:none}
.obox{max-width:860px;width:100%;border:1px solid var(--line);background:var(--panel);padding:18px}
.obox pre{color:var(--amber-hi);overflow-x:auto;font-size:12px;line-height:1.2;margin-bottom:10px}
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.fcard{border:1px solid var(--amber-dim);padding:10px;cursor:pointer;background:transparent;
  color:var(--amber);font:inherit;text-align:left;text-shadow:inherit}
.fcard:hover{background:var(--amber);color:#0d0d0d;text-shadow:none}
.fcard:hover .muted,.fcard:hover .g{color:#0d0d0d}
.fcard b{font-size:16px;letter-spacing:1px}
/* ============ MOBILE ============ */
@media (max-width:840px){
  body{overflow:auto}
  #app{grid-template-columns:1fr;height:auto}
  .panel{min-height:auto;max-height:none}
  #tabContent{max-height:55vh}
  #log{max-height:36vh}
  #stats,#rank{max-height:40vh}
  #defcon{font-size:12px;gap:6px}
  .fgrid{grid-template-columns:1fr 1fr}
}
@media (prefers-reduced-motion: reduce){
  .cursor::after{animation:none}
  .le{animation:none}
}
</style>
</head>
<body>
<div id="crt" aria-hidden="true"></div>
<header id="defcon"></header>
<main id="app">
  <section class="panel" id="statsPanel">
    <h2>NATION STATUS</h2>
    <div id="stats"></div>
  </section>
  <section class="panel" id="centerPanel">
    <div id="cmdbar"></div>
    <nav id="tabs" aria-label="Actions"></nav>
    <div id="tabContent"></div>
    <h2 class="logTitle">EVENT LOG</h2>
    <div id="log" aria-live="polite"></div>
  </section>
  <section class="panel" id="rankPanel">
    <h2>WORLD RANKING</h2>
    <div id="rank"></div>
  </section>
</main>
<div id="factionOverlay" class="overlay"></div>
<div id="overOverlay" class="overlay hidden"></div>
<script>
'use strict';
/* =====================================================================
   EIXO DO MAL — game engine
   Layer 1: CONFIG (all balance numbers live here), state, pure helpers
   ===================================================================== */
const CONFIG = {
  actionsPerTurn: 10,
  startRes: { gold:1500, oil:120, food:600, industry:60, pop:1000 },
  popCapBase: 2000, popCapPerBuilding: 400,
  buildings: {
    oilField:        { n:'Oil Field',        i:'🛢️', g:300,  ind:5,  d:'+20 oil/turn' },
    farm:            { n:'Farm',             i:'🌾', g:250,  ind:3,  d:'+30 food/turn' },
    factory:         { n:'Factory',          i:'⚙️', g:450,  ind:0,  d:'+8 industry/turn' },
    bank:            { n:'Bank',             i:'💰', g:500,  ind:8,  d:'+60 gold/turn' },
    barracks:        { n:'Barracks',         i:'🛡️', g:350,  ind:6,  d:'+100 troop capacity' },
    bunker:          { n:'Bunker',           i:'🧱', g:400,  ind:10, d:'+5% defense' },
    lab:             { n:'Research Lab',     i:'🔬', g:800,  ind:15, d:'unlocks tech tree' },
    nuclearFacility: { n:'Nuclear Facility', i:'☢️', g:4000, ind:60, d:'enables warhead program', req:'nuclearPhysics' }
  },
  units: {
    infantry: { n:'Infantry',     g:20,  f:5,  batch:10, atk:1, def:1.2, fu:0.5, ou:0 },
    tank:     { n:'Tank',         g:150, f:20, batch:5,  atk:4, def:5,   fu:1,   ou:1 },
    jet:      { n:'Jet Fighter',  g:300, f:10, batch:2,  atk:6, def:5,   fu:1,   ou:2 },
    spy:      { n:'Spy',          g:100, f:5,  batch:5,  atk:0, def:0,   fu:0.5, ou:0 },
    scud:     { n:'SCUD Missile', g:500, f:0,  batch:1,  atk:0, def:0,   fu:0,   ou:0 }
  },
  factions: {
    iran:       { n:'Iran',        flag:'🇮🇷', bonus:'Oil income +15%',   oil:1.15 },
    iraq:       { n:'Iraq',        flag:'🇮🇶', bonus:'Attack power +10%', atk:1.10 },
    northkorea: { n:'North Korea', flag:'🇰🇵', bonus:'Spy cost −20%',     spyCost:0.8 },
    cuba:       { n:'Cuba',        flag:'🇨🇺', bonus:'Pop. growth +10%',  pop:1.10 },
    libya:      { n:'Libya',       flag:'🇱🇾', bonus:'Gold income +15%',  gold:1.15 },
    syria:      { n:'Syria',       flag:'🇸🇾', bonus:'Defense +15%',      def:1.15 }
  },
  techs: [
    { id:'advAgri',        tier:1, n:'Advanced Agriculture', g:800,  d:'+10% food production' },
    { id:'steel',          tier:1, n:'Steel Industry',       g:800,  d:'+10% industry output' },
    { id:'guided',         tier:2, n:'Guided Missiles',      g:2000, d:'+15% attack power' },
    { id:'encryption',     tier:2, n:'Encryption',           g:2000, d:'+15% spy defense' },
    { id:'nuclearPhysics', tier:3, n:'Nuclear Physics',      g:5000, d:'unlocks Nuclear Facility' },
    { id:'blackMarket',    tier:3, n:'Black Market',         g:4000, d:'+20% gold income' },
    { id:'icbm',           tier:4, n:'ICBM Program',         g:8000, d:'warhead becomes deployable', req:'nuclearPhysics' }
  ],
  warhead: { researchNeeded:50, g:5000, oil:100 },
  // AI personality weight profiles. ratio = attack when myPower >= ratio × targetDefense.
  profiles: {
    aggressive:{ build:{barracks:3,oilField:2,farm:1.5,bank:1,factory:1,bunker:.5,lab:.3},
                 train:{infantry:2,tank:3,jet:2,spy:.3}, ratio:0.9, spy:.10, acceptAlly:.15 },
    defensive: { build:{bunker:3,farm:2,bank:1,factory:1,oilField:1,barracks:1,lab:.4},
                 train:{infantry:3,tank:1,jet:1,spy:.5}, ratio:99,  spy:.10, acceptAlly:.60 },
    economic:  { build:{bank:3,factory:3,farm:1.5,oilField:2,barracks:.5,bunker:1,lab:.6},
                 train:{infantry:1,tank:.5,jet:.5,spy:.3}, ratio:1.5, spy:.10, acceptAlly:.60 },
    espionage: { build:{lab:1.5,bank:1,farm:1.2,factory:1,oilField:1,bunker:1,barracks:.5},
                 train:{spy:3,infantry:1,tank:.5,jet:.5}, ratio:1.4, spy:.85, acceptAlly:.50 },
    balanced:  { build:{farm:1.2,bank:1,factory:1,oilField:1,barracks:1,bunker:1,lab:.5},
                 train:{infantry:1,tank:1,jet:1,spy:1}, ratio:1.2, spy:.30, acceptAlly:.40 }
  },
  bootLines: [
    'EIXO-OS v2.3 ... terminal link established.',
    'Satellite uplink: 6 rogue states detected.',
    'UN sanctions in effect. Nobody cares.',
    'Your reign begins. The world is watching.'
  ]
};

/* ---------- tiny utils ---------- */
const rnd = Math.random;
const rint = (a,b)=>a+Math.floor(rnd()*(b-a+1));
const chance = p=>rnd()<p;
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const fmt = v=>Math.floor(v).toLocaleString('en-US');
const pick = a=>a[Math.floor(rnd()*a.length)];
function shuffle(a){ const c=a.slice(); for(let i=c.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[c[i],c[j]]=[c[j],c[i]];} return c; }
function weightedPick(weights){
  const es = Object.entries(weights).filter(e=>e[1]>0);
  let tot = es.reduce((s,e)=>s+e[1],0); if(tot<=0) return null;
  let r = rnd()*tot;
  for(const [k,w] of es){ r-=w; if(r<=0) return k; }
  return es[es.length-1][0];
}
function asciiBar(v,max,len){
  const f = clamp(Math.round(v/max*len),0,len);
  return '█'.repeat(f)+'░'.repeat(len-f);
}

/* ---------- game state ---------- */
let G = null;                                   // single source of truth
const UI = { tab:'build', attackTarget:null };  // view-only state

function newNation(faction,isPlayer,personality){
  return {
    id:faction, faction, isPlayer, personality, alive:true,
    res:{ ...CONFIG.startRes },
    b:{ oilField:2, farm:3, factory:2, bank:1, barracks:1, bunker:1, lab:0, nuclearFacility:0 },
    army:{ infantry:50, tank:5, jet:0, spy:5, scud:0, warhead:0 },
    techs:[], morale:100, relations:{}, intel:{}, nukeProg:0,
    oilShort:false, lastAttackedBy:null, hitThisCycle:0
  };
}

function initGame(playerFaction){
  const others = shuffle(Object.keys(CONFIG.factions).filter(f=>f!==playerFaction));
  const persL  = shuffle(['aggressive','defensive','economic','espionage','balanced']);
  G = {
    turn:1, actions:CONFIG.actionsPerTurn, nations:[], log:[],
    over:false, result:null, streak:0, coalition:false, started:true
  };
  G.nations.push(newNation(playerFaction,true,null));
  others.forEach((f,i)=>G.nations.push(newNation(f,false,persL[i%persL.length])));
  log('sys','— TURN 1 — Choose your moves wisely. 10 actions per turn.');
  bootSequence();
  render();
}

/* ---------- accessors ---------- */
const P    = ()=>G.nations[0];
const byId = id=>G.nations.find(n=>n.id===id);
const nm   = n=>CONFIG.factions[n.faction].n;
const fb   = n=>CONFIG.factions[n.faction];
const hasTech = (n,id)=>n.techs.includes(id);
const techOf  = id=>CONFIG.techs.find(t=>t.id===id);
const totalBuildings = n=>Object.values(n.b).reduce((s,v)=>s+v,0);
const popCap   = n=>CONFIG.popCapBase + totalBuildings(n)*CONFIG.popCapPerBuilding;
const troopCnt = n=>n.army.infantry+n.army.tank+n.army.jet;
const troopCap = n=>100 + n.b.barracks*100;
const rawPower = n=>n.army.infantry + n.army.tank*4 + n.army.jet*6;
const score    = n=>Math.floor(n.res.gold + n.res.pop*2 + rawPower(n)*3 + totalBuildings(n)*500 + n.techs.length*1000);
function rankOf(n){
  return G.nations.filter(x=>x.alive).sort((a,b)=>score(b)-score(a)).indexOf(n)+1;
}
function log(type,text){
  G.log.unshift({ t:G.turn, type, text });
  if(G.log.length>200) G.log.length = 200;
}

/* ---------- relations ---------- */
const rel = (a,b)=>a.relations[b.id] || 'peace';
function setRel(a,b,ra,rb){ a.relations[b.id]=ra; b.relations[a.id]=rb??ra; }
function setWar(a,b){
  if(rel(a,b)==='war') return;
  if(rel(a,b)==='vassal'||rel(a,b)==='master'){ /* rebellion / betrayal breaks the bond */ }
  setRel(a,b,'war');
  log('diplo',`${nm(a)} and ${nm(b)} are now AT WAR.`);
}
function warsCount(){
  let w=0; const ns=G.nations.filter(n=>n.alive);
  for(let i=0;i<ns.length;i++) for(let j=i+1;j<ns.length;j++)
    if(rel(ns[i],ns[j])==='war') w++;
  return w;
}

/* =====================================================================
   Layer 2: economy — incomes, upkeep, end-of-turn tick (pure-ish math)
   ===================================================================== */
function industryMult(n){ return 1 + Math.min(n.res.industry,300)/300; }   // up to 2×

function incomes(n){
  const m=industryMult(n), f=fb(n);
  return {
    gold: (n.res.pop*0.5 + n.b.bank*60) * m * (f.gold||1) * (hasTech(n,'blackMarket')?1.2:1),
    oil:  n.b.oilField*20 * m * (f.oil||1),
    food: n.b.farm*30 * m * (hasTech(n,'advAgri')?1.1:1),
    ind:  n.b.factory*8 * m * (hasTech(n,'steel')?1.1:1)
  };
}
function upkeep(n){
  const u=CONFIG.units, a=n.army;
  return {
    food: n.res.pop*0.02 + a.infantry*u.infantry.fu + a.tank*u.tank.fu + a.jet*u.jet.fu + a.spy*u.spy.fu,
    oil:  a.tank*u.tank.ou + a.jet*u.jet.ou
  };
}
function econTick(n){
  const inc=incomes(n), up=upkeep(n), r=n.res, f=fb(n);
  r.gold += inc.gold;
  r.industry += inc.ind;
  r.oil += inc.oil - up.oil;
  n.oilShort = r.oil < 0;
  if(r.oil<0){ r.oil=0; if(n.isPlayer) log('eco','OIL SHORTAGE — tanks and jets operate at 50% power.'); }
  r.food += inc.food - up.food;
  if(r.food<0){
    r.food=0; r.pop=Math.floor(r.pop*0.95); n.morale=clamp(n.morale-20,20,150);
    if(n.isPlayer) log('eco','FAMINE! Population −5%, morale collapses. Build farms.');
  } else {
    const growth = 1 + 0.02*(f.pop||1);            // Cuba grows 2.2%/turn
    r.pop = Math.min(popCap(n), Math.floor(r.pop*growth));
  }
  n.morale = clamp(n.morale + (n.morale<100?5:(n.morale>100?-3:0)),20,150);
  // passive nuclear research with an active facility
  if(n.b.nuclearFacility>0 && hasTech(n,'nuclearPhysics') && n.nukeProg<CONFIG.warhead.researchNeeded)
    n.nukeProg++;
}

/* =====================================================================
   Layer 3: combat, spies, missiles, nukes
   ===================================================================== */
function atkPower(n,units){
  const f=fb(n), pen=n.oilShort?0.5:1;
  return (units.infantry*1 + units.tank*4*pen + units.jet*6*pen)
         * (n.morale/100) * (f.atk||1) * (hasTech(n,'guided')?1.15:1);
}
function defPower(n){
  const f=fb(n), pen=n.oilShort?0.5:1;
  const lastStand = totalBuildings(n)<=3 ? 1.5 : 1;   // cornered nations fight desperately
  return (n.army.infantry*1.2 + n.army.tank*5*pen + n.army.jet*5*pen)
         * (1 + n.b.bunker*0.05) * (f.def||1) * lastStand;
}
function lossCommit(n,commit,p){ for(const k of ['infantry','tank','jet']) n.army[k]-=Math.floor(commit[k]*p); }
function lossAll(n,p){ for(const k of ['infantry','tank','jet']) n.army[k]-=Math.floor(n.army[k]*p); }
function destroyRandomBuilding(n){
  const w={}; for(const k in n.b) if(n.b[k]>0) w[k]=n.b[k];
  const key=weightedPick(w); if(!key) return null;
  n.b[key]--; return CONFIG.buildings[key].n;
}

/* Full ground assault. pct = fraction of attacker's army committed. */
function resolveAttack(att,def,pct){
  setWar(att,def);
  def.lastAttackedBy = att.id;
  def.hitThisCycle = (def.hitThisCycle||0)+1;
  const commit={
    infantry:Math.floor(att.army.infantry*pct),
    tank:Math.floor(att.army.tank*pct),
    jet:Math.floor(att.army.jet*pct)
  };
  if(commit.infantry+commit.tank+commit.jet===0){
    log('war',`${nm(att)} declared an offensive but fielded no troops. Embarrassing.`); return false;
  }
  const ap=atkPower(att,commit)*(0.9+rnd()*0.2);
  const dp=defPower(def)   *(0.9+rnd()*0.2);
  if(ap>dp){
    lossCommit(att,commit,0.12); lossAll(def,0.30);
    const loot=Math.floor(def.res.gold*0.10); def.res.gold-=loot; att.res.gold+=loot;
    const destroyed=[]; const nDest=rint(1,2);
    for(let i=0;i<nDest;i++){ const b=destroyRandomBuilding(def); if(b) destroyed.push(b); }
    att.morale=clamp(att.morale+10,20,150); def.morale=clamp(def.morale-15,20,150);
    log('war',`⚔ ${nm(att)} broke through ${nm(def)}'s lines! Looted ${fmt(loot)} gold`+
        (destroyed.length?`; razed: ${destroyed.join(', ')}.`:'.'));
    checkDestroyed(def);
    return true;
  } else {
    lossCommit(att,commit,0.30); lossAll(def,0.10);
    att.morale=clamp(att.morale-15,20,150); def.morale=clamp(def.morale+10,20,150);
    log('war',`⚔ ${nm(def)} repelled ${nm(att)}'s assault — invaders routed with heavy losses.`);
    checkDestroyed(att);
    return false;
  }
}

/* SCUD strike: consumes one missile, may level buildings. Jets intercept. */
function scudStrike(att,def){
  att.army.scud--; setWar(att,def); def.lastAttackedBy=att.id;
  const hitP = clamp(0.75 - def.army.jet*0.005, 0.2, 0.9);
  if(chance(hitP)){
    const destroyed=[]; const nDest=rint(1,2);
    for(let i=0;i<nDest;i++){ const b=destroyRandomBuilding(def); if(b) destroyed.push(b); }
    log('war',`🚀 SCUD from ${nm(att)} slammed into ${nm(def)}${destroyed.length?` — destroyed: ${destroyed.join(', ')}.`:' — empty fields hit.'}`);
    checkDestroyed(def);
  } else {
    log('war',`🚀 ${nm(def)}'s air force intercepted a SCUD launched by ${nm(att)}.`);
  }
}

/* Covert operation. Uses the whole spy network. */
function spyMission(att,def,mission){
  if(att.army.spy<1){ if(att.isPlayer) log('spy','You have no spies. Train some first.'); return; }
  const enc = hasTech(def,'encryption')?1.15:1;
  const p = clamp(att.army.spy/(Math.max(def.army.spy,1)*1.5*enc),0.05,0.95);
  if(chance(p)){
    if(mission==='steal'){
      const amt=Math.floor(def.res.gold*(0.05+rnd()*0.10));
      def.res.gold-=amt; att.res.gold+=amt;
      log('spy',`🕶 ${nm(att)}'s spies infiltrated ${nm(def)} and stole ${fmt(amt)} gold.`);
    } else if(mission==='sabotage'){
      const b=destroyRandomBuilding(def);
      log('spy', b?`🕶 Sabotage! ${nm(def)}'s ${b} reduced to smoking rubble by ${nm(att)} agents.`
                  :`🕶 Saboteurs from ${nm(att)} found nothing left to destroy in ${nm(def)}.`);
      checkDestroyed(def);
    } else { // intel
      att.intel[def.id]=G.turn;
      log('spy',`🕶 ${nm(att)} acquired a full intelligence dossier on ${nm(def)}.`);
    }
  } else {
    const lost=Math.max(1,Math.floor(att.army.spy*(0.1+rnd()*0.2)));
    att.army.spy-=lost;
    log('spy',`🕶 Operation in ${nm(def)} blown — ${lost} of ${nm(att)}'s agents captured.`);
  }
}

/* Nuclear strike. The endgame button. */
function deployNuke(att,def){
  att.army.warhead--;
  setWar(att,def);
  def.res.pop = Math.floor(def.res.pop*0.30);
  for(const k in def.b) def.b[k] = Math.ceil(def.b[k]*0.40);
  def.morale = 20;
  log('nuke',`☢☢☢ ${nm(att)} DETONATED A NUCLEAR WARHEAD OVER ${nm(def).toUpperCase()}. The world holds its breath.`);
  checkDestroyed(def);
  if(att.isPlayer){
    if(rankOf(att)===1) winGame('nuclear');
    else log('nuke','You hold the bomb… but not the throne. Become the #1 power and strike again.');
  } else {
    if(rankOf(att)===1 && !G.over) loseGame(`${nm(att)} achieved nuclear supremacy. Your era is over.`);
  }
}

/* ---------- destruction & endings ---------- */
function checkDestroyed(n){
  if(!n.alive) return;
  if(n.res.pop<=0 || totalBuildings(n)<=0){
    n.alive=false;
    log('nuke',`☠ THE NATION OF ${nm(n).toUpperCase()} HAS FALLEN. Its lands are ash and silence.`);
    for(const o of G.nations) if(o!==n){ delete o.relations[n.id]; }
    if(n.isPlayer) loseGame('Your nation was wiped from the map.');
    if(UI.attackTarget===n.id) UI.attackTarget=null;
  }
}
function winGame(type){
  if(G.over) return;
  G.over=true;
  G.result={ win:true, type,
    msg: type==='nuclear' ? 'NUCLEAR VICTORY — you deployed the warhead as the world\u2019s #1 power.'
                          : 'DOMINATION VICTORY — you control 4 of the 6 nations of the Axis.' };
  log('nuke','★★★ TOTAL VICTORY ★★★');
}
function loseGame(reason){
  if(G.over) return;
  G.over=true;
  G.result={ win:false, msg:reason };
  log('nuke','— GAME OVER —');
}
function checkAll(){
  if(G.over) return;
  for(const n of G.nations) checkDestroyed(n);
  if(G.over) return;
  // domination: you + your vassals + allies control 4 of 6
  const ctrl = 1 + G.nations.filter(n=>!n.isPlayer&&n.alive&&['vassal','alliance'].includes(rel(P(),n))).length;
  if(ctrl>=4) winGame('domination');
}
/* =====================================================================
   Layer 4: shared action helpers (used by both player and AI)
   ===================================================================== */
function buildCostOk(n,key){
  const b=CONFIG.buildings[key];
  if(b.req && !hasTech(n,b.req)) return false;
  return n.res.gold>=b.g && n.res.industry>=b.ind;
}
function doBuild(n,key){
  const b=CONFIG.buildings[key];
  if(!buildCostOk(n,key)) return false;
  n.res.gold-=b.g; n.res.industry-=b.ind; n.b[key]++;
  return true;
}
function unitGoldCost(n,key){
  const u=CONFIG.units[key];
  return u.g * u.batch * (key==='spy'?(fb(n).spyCost||1):1);
}
function trainCostOk(n,key){
  const u=CONFIG.units[key];
  if(['infantry','tank','jet'].includes(key) && troopCnt(n)+u.batch>troopCap(n)) return false;
  return n.res.gold>=unitGoldCost(n,key) && n.res.food>=u.f*u.batch;
}
function doTrain(n,key){
  const u=CONFIG.units[key];
  if(!trainCostOk(n,key)) return false;
  n.res.gold-=unitGoldCost(n,key); n.res.food-=u.f*u.batch; n.army[key]+=u.batch;
  return true;
}
function availTechs(n){
  return CONFIG.techs.filter(t=>{
    if(hasTech(n,t.id) || n.b.lab<1) return false;
    if(t.req && !hasTech(n,t.req)) return false;
    if(t.tier>1 && !n.techs.some(id=>techOf(id).tier===t.tier-1)) return false;
    return true;
  });
}
function doResearch(n,t){
  if(n.res.gold<t.g) return false;
  n.res.gold-=t.g; n.techs.push(t.id);
  return true;
}

/* =====================================================================
   Layer 5: AI brains — one greedy decision function × five weight maps
   ===================================================================== */
let microIdx=0;
/* micro-turn: one cheap move by one rotating AI after each player action.
   Keeps the world feeling alive without overwhelming the player. */
function aiMicro(){
  if(G.over) return;
  const ais=G.nations.filter(n=>!n.isPlayer&&n.alive);
  if(!ais.length) return;
  const n=ais[microIdx++ % ais.length];
  const inc=incomes(n), up=upkeep(n);
  if(inc.food-up.food<0 && doBuild(n,'farm')) return;
  if(chance(0.5)){ if(aiTrainWeighted(n)) return; }
  if(aiBuildWeighted(n)) return;
  n.res.gold += Math.floor(n.res.pop*0.12);  // hustle: minor tax collection
}
function aiBuildWeighted(n){
  const Pf=CONFIG.profiles[n.personality];
  const w={}; for(const k in Pf.build) if(buildCostOk(n,k)) w[k]=Pf.build[k];
  const key=weightedPick(w); if(!key) return false;
  return doBuild(n,key);
}
function aiTrainWeighted(n){
  const Pf=CONFIG.profiles[n.personality];
  const w={}; for(const k in Pf.train) if(trainCostOk(n,k)) w[k]=Pf.train[k];
  const key=weightedPick(w); if(!key) return false;
  return doTrain(n,key);
}
function aiResearch(n){
  const av=availTechs(n).filter(t=>n.res.gold>=t.g*1.5); // keep a cash buffer
  if(!av.length) return false;
  return doResearch(n, av.sort((a,b)=>a.g-b.g)[0]);
}
function aiSpy(n){
  if(n.army.spy<3) return false;
  const targets=G.nations.filter(x=>x!==n&&x.alive&&!['alliance','vassal','master'].includes(rel(n,x)));
  if(!targets.length) return false;
  const t=targets.sort((a,b)=>b.res.gold-a.res.gold)[0];
  spyMission(n,t, chance(0.3)?'sabotage':'steal');
  return true;
}
function aiConsiderAttack(n){
  if(G.turn<6) return false;                       // early-game grace period
  const Pf=CONFIG.profiles[n.personality];
  let targets=G.nations.filter(x=>x!==n&&x.alive&&(x.hitThisCycle||0)<2&&!['alliance','vassal','master'].includes(rel(n,x)));
  if(!targets.length) return false;
  let t=null, needed=Pf.ratio;
  if(n.personality==='defensive'){
    // defensive AIs never start wars — they only counterattack their last aggressor
    const ag = n.lastAttackedBy && byId(n.lastAttackedBy);
    if(!ag || !ag.alive || rel(n,ag)!=='war') return false;
    t=ag; needed=0.8;
  } else {
    if(G.coalition && rel(n,P())==='war' && targets.includes(P())) t=P();
    else t=targets.sort((a,b)=>score(a)-score(b))[0];        // hunt the weakest
  }
  const commit={infantry:Math.floor(n.army.infantry*0.7),tank:Math.floor(n.army.tank*0.7),jet:Math.floor(n.army.jet*0.7)};
  if(atkPower(n,commit) >= defPower(t)*needed && (commit.infantry+commit.tank+commit.jet)>20){
    resolveAttack(n,t,0.7);
    return true;
  }
  return false;
}
/* the long road to the bomb, step by step */
function aiNukeStep(n){
  if(n.res.gold<5000) return false;
  if(n.b.lab<1) return doBuild(n,'lab');
  if(!hasTech(n,'nuclearPhysics')){
    const av=availTechs(n).filter(t=>n.res.gold>=t.g);
    if(!av.length) return false;
    const phys=av.find(t=>t.id==='nuclearPhysics');
    return doResearch(n, phys || av.sort((a,b)=>a.g-b.g)[0]);
  }
  if(n.b.nuclearFacility<1) return doBuild(n,'nuclearFacility');
  if(!hasTech(n,'icbm')){
    const ic=availTechs(n).find(t=>t.id==='icbm');
    if(ic && n.res.gold>=ic.g) return doResearch(n,ic);
  }
  if(n.nukeProg<CONFIG.warhead.researchNeeded){ n.nukeProg=Math.min(CONFIG.warhead.researchNeeded,n.nukeProg+1); return true; }
  if(n.army.warhead<1 && hasTech(n,'icbm')){
    const W=CONFIG.warhead;
    if(n.res.gold>=W.g && n.res.oil>=W.oil){
      n.res.gold-=W.g; n.res.oil-=W.oil; n.army.warhead++;
      log('nuke',`☢ Intelligence reports: ${nm(n)} has assembled a NUCLEAR WARHEAD.`);
      return true;
    }
    return false;
  }
  if(n.army.warhead>0 && hasTech(n,'icbm')){
    const en=G.nations.filter(x=>x!==n&&x.alive&&!['alliance','vassal','master'].includes(rel(n,x)));
    if(en.length){ deployNuke(n, en.sort((a,b)=>score(b)-score(a))[0]); return true; }
  }
  return false;
}
function aiDiplomacy(n){
  // anti-player coalition: kicks in if you've been #1 for 5+ straight turns
  if(G.coalition && rel(n,P())!=='war' && rel(n,P())!=='vassal' && chance(0.30)){
    setWar(n,P());
    log('diplo',`${nm(n)} has joined the coalition against you!`);
    return;
  }
  // occasional AI–AI alliances
  if(chance(0.10)){
    const cands=G.nations.filter(x=>x!==n&&!x.isPlayer&&x.alive&&rel(n,x)==='peace');
    if(cands.length){
      const t=pick(cands);
      if(chance(CONFIG.profiles[t.personality].acceptAlly)){
        setRel(n,t,'alliance');
        log('diplo',`${nm(n)} and ${nm(t)} signed a secret pact of alliance.`);
      }
    }
  }
  // sue for peace when badly losing a war against the player
  if(rel(n,P())==='war' && score(n)<score(P())*0.4 && chance(0.25)){
    setRel(n,P(),'peace');
    log('diplo',`${nm(n)} unilaterally sued for peace with you, fearing annihilation.`);
  }
}
/* macro-turn: each AI gets a budget of 6 decisions at end of turn */
function aiMacro(n){
  for(let i=0;i<6;i++){
    if(!n.alive||G.over) return;
    const up=upkeep(n), inc=incomes(n);
    if(n.res.food < up.food*2 && inc.food-up.food<0 && doBuild(n,'farm')) continue;
    if(G.turn>30 && chance(0.35) && aiNukeStep(n)) continue;
    if(chance(0.20) && aiResearch(n)) continue;
    if(chance(CONFIG.profiles[n.personality].spy) && aiSpy(n)) continue;
    if(chance(0.5) ? (aiBuildWeighted(n)||aiTrainWeighted(n)) : (aiTrainWeighted(n)||aiBuildWeighted(n))) continue;
    n.res.gold += Math.floor(n.res.pop*0.12);
  }
  if(n.alive && !G.over && chance(0.6)) aiConsiderAttack(n);   // at most one offensive per turn
  if(n.alive && !G.over) aiDiplomacy(n);
}

/* =====================================================================
   Layer 6: player action handlers (event-delegated via data-a attrs)
   ===================================================================== */
function spend(cost){
  if(G.over) return false;
  if(G.actions<cost){ log('sys',`Not enough actions (need ${cost}). End your turn.`); render(); return false; }
  G.actions-=cost; return true;
}
function afterAction(){ aiMicro(); checkAll(); render(); }

function endTurn(){
  if(G.over) return;
  for(const n of G.nations) n.hitThisCycle=0;
  for(const n of G.nations) if(n.alive) econTick(n);
  // vassal tribute: 10% of vassal gold flows to the master each turn
  for(const n of G.nations){
    if(!n.alive) continue;
    for(const oid in n.relations){
      if(n.relations[oid]==='master'){
        const m=byId(oid);
        if(m&&m.alive){ const tr=Math.floor(n.res.gold*0.10); n.res.gold-=tr; m.res.gold+=tr;
          if(m.isPlayer&&tr>0) log('eco',`Vassal ${nm(n)} paid ${fmt(tr)} gold in tribute.`); }
      }
    }
  }
  for(const n of G.nations) if(!n.isPlayer&&n.alive) aiMacro(n);
  // coalition pressure: dominate too long and the world turns on you
  if(!G.over){
    if(rankOf(P())===1){ G.streak++; } else G.streak=0;
    if(G.streak>=5 && !G.coalition){
      G.coalition=true;
      log('diplo','⚠ WORLD ALERT: your dominance has united the rogue states against you.');
    }
  }
  G.turn++; G.actions=CONFIG.actionsPerTurn;
  log('sys',`— TURN ${G.turn} — ${CONFIG.actionsPerTurn} actions restored.`);
  checkAll(); render();
}

const FLAVOR={
  collect:['Emergency requisition complete','Tax collectors swept the bazaars','State coffers reinforced'],
  build:['Construction crews finished the','Workers raised a new','State engineers completed the'],
  train:['Fresh recruits sworn in:','Military parade welcomes','Drill sergeants delivered']
};

const H = {
  /* ---- meta ---- */
  tab:(p)=>{ UI.tab=p; UI.attackTarget=null; render(); },
  newGame:()=>{ G=null; UI.tab='build'; UI.attackTarget=null; render(); },
  pickFaction:(p)=>initGame(p),
  back:()=>{ UI.attackTarget=null; render(); },

  /* ---- economy ---- */
  collect:()=>{
    if(!spend(1)) return;
    const inc=incomes(P()), r=P().res;
    r.gold+=inc.gold*0.5; r.oil+=inc.oil*0.5; r.food+=inc.food*0.5; r.industry+=inc.ind*0.5;
    log('eco',`${pick(FLAVOR.collect)}: +${fmt(inc.gold*0.5)} gold, +${fmt(inc.oil*0.5)} oil, +${fmt(inc.food*0.5)} food.`);
    afterAction();
  },
  build:(p)=>{
    if(!buildCostOk(P(),p)){ log('sys','Cannot afford that structure.'); render(); return; }
    if(!spend(1)) return;
    doBuild(P(),p);
    log('eco',`${pick(FLAVOR.build)} ${CONFIG.buildings[p].n}.`);
    afterAction();
  },
  train:(p)=>{
    if(!trainCostOk(P(),p)){ log('sys','Cannot train: check gold, food and barracks capacity.'); render(); return; }
    if(!spend(1)) return;
    doTrain(P(),p);
    log('eco',`${pick(FLAVOR.train)} ${CONFIG.units[p].batch}× ${CONFIG.units[p].n}.`);
    afterAction();
  },

  /* ---- war ---- */
  target:(p)=>{ UI.attackTarget=p; render(); },
  attack:(p)=>{
    const t=byId(UI.attackTarget); if(!t||!t.alive) return;
    if(!spend(2)) return;
    resolveAttack(P(),t,parseInt(p,10)/100);
    afterAction();
  },
  scud:()=>{
    const t=byId(UI.attackTarget); if(!t||!t.alive||P().army.scud<1) return;
    if(!spend(1)) return;
    scudStrike(P(),t);
    afterAction();
  },
  nuke:()=>{
    const t=byId(UI.attackTarget); if(!t||!t.alive||P().army.warhead<1||!hasTech(P(),'icbm')) return;
    if(!spend(2)) return;
    deployNuke(P(),t);
    afterAction();
  },

  /* ---- espionage ---- */
  spy:(p,q)=>{
    const t=byId(p); if(!t||!t.alive) return;
    if(!spend(1)) return;
    spyMission(P(),t,q);
    afterAction();
  },

  /* ---- science ---- */
  tech:(p)=>{
    const t=techOf(p), me=P();
    if(!availTechs(me).includes(t)||me.res.gold<t.g){ log('sys','Research unavailable.'); render(); return; }
    if(!spend(1)) return;
    doResearch(me,t);
    log('eco',`🔬 Research complete: ${t.n} — ${t.d}.`);
    afterAction();
  },
  nukeAdv:()=>{
    const me=P();
    if(me.b.nuclearFacility<1||!hasTech(me,'nuclearPhysics')||me.nukeProg>=CONFIG.warhead.researchNeeded) return;
    if(!spend(1)) return;
    me.nukeProg=Math.min(CONFIG.warhead.researchNeeded, me.nukeProg+2);
    log('eco',`☢ Warhead program advanced: ${me.nukeProg}/${CONFIG.warhead.researchNeeded}.`);
    afterAction();
  },
  assemble:()=>{
    const me=P(), W=CONFIG.warhead;
    if(me.nukeProg<W.researchNeeded||me.res.gold<W.g||me.res.oil<W.oil) { log('sys','Warhead assembly requirements not met.'); render(); return; }
    if(!spend(1)) return;
    me.res.gold-=W.g; me.res.oil-=W.oil; me.army.warhead++;
    log('nuke','☢ WARHEAD ASSEMBLED. The button is yours. Research ICBM Program to deploy.');
    afterAction();
  },

  /* ---- diplomacy ---- */
  diplo:(p,q)=>{
    const t=byId(p), me=P();
    if(!t||!t.alive) return;
    if(!spend(1)) return;
    if(q==='ally'){
      const base=CONFIG.profiles[t.personality].acceptAlly;
      const ratio=score(me)/Math.max(score(t),1);
      const ok = ratio>0.5 && ratio<2.5 && chance(base + (rel(me,t)==='war'?-0.3:0));
      if(ok){ setRel(me,t,'alliance'); log('diplo',`🤝 ${nm(t)} accepted your alliance proposal.`); }
      else log('diplo',`${nm(t)} rejected your alliance proposal.`);
    } else if(q==='war'){
      setWar(me,t);
    } else if(q==='peace'){
      const ok = chance(score(t)<score(me)?0.7:0.35);
      if(ok){ setRel(me,t,'peace'); log('diplo',`🕊 ${nm(t)} signed a peace treaty with you.`); }
      else log('diplo',`${nm(t)} refused your peace offer. The war continues.`);
    } else if(q==='vassal'){
      if(rel(me,t)==='war' && score(t)<score(me)*0.25){
        setRel(me,t,'vassal','master');
        log('diplo',`♟ ${nm(t)} capitulated and is now your VASSAL. Tribute will flow.`);
      } else log('diplo',`${nm(t)} spat on your demand for vassalage.`);
    } else if(q==='break'){
      setRel(me,t,'peace');
      log('diplo',`You dissolved the alliance with ${nm(t)}.`);
    }
    afterAction();
  },
  endTurn
};
/* =====================================================================
   Layer 7: rendering — one render() rewrites everything from state
   ===================================================================== */
const $=id=>document.getElementById(id);
const REL_ICON={war:'⚔',alliance:'✦',vassal:'♟',master:'⛓',peace:'·'};

function render(){
  if(!G || !G.started){ renderFactionOverlay(true); return; }
  renderFactionOverlay(false);
  renderDefcon(); renderStats(); renderCmd(); renderTabs(); renderTabContent();
  renderLog(); renderRank(); renderOver();
}

function renderDefcon(){
  const w=warsCount(), d=clamp(5-w,1,5);
  const blocks=Array.from({length:5},(_,i)=>i<(6-d)?'■':'□').join('');
  $('defcon').innerHTML=
    `<span class="brand">EIXO DO MAL <small>// WORLD DOMINATION TERMINAL v2.3</small></span>`+
    `<span class="dstat d${d}">DEFCON ${d} [${blocks}] ${w} active war${w===1?'':'s'}</span>`+
    `<span class="dstat">${fb(P()).flag} ${nm(P()).toUpperCase()} · TURN <b>${G.turn}</b><span class="cursor"></span></span>`;
}

function renderStats(){
  const n=P(), inc=incomes(n), up=upkeep(n);
  const dRow=(icon,name,val,delta)=>{
    const cls=delta>=0?'g':'r', sign=delta>=0?'+':'−';
    return `<div class="kv"><span>${icon} ${name}</span><span>${fmt(val)} <span class="${cls}">${sign}${fmt(Math.abs(delta))}</span></span></div>`;
  };
  let h='';
  h+=`<div class="sec">RESOURCES /turn</div>`;
  h+=dRow('💰','Gold',n.res.gold,inc.gold);
  h+=dRow('🛢️','Oil',n.res.oil,inc.oil-up.oil);
  h+=dRow('🌾','Food',n.res.food,inc.food-up.food);
  h+=dRow('⚙️','Industry',n.res.industry,inc.ind);
  h+=`<div class="kv"><span>👥 Population</span><span>${fmt(n.res.pop)} <span class="dim">/${fmt(popCap(n))}</span></span></div>`;
  h+=`<div class="kv"><span class="dim">Industry mult.</span><span class="dim">×${industryMult(n).toFixed(2)}</span></div>`;
  h+=`<div class="sec">MORALE</div>`;
  h+=`<div>${n.morale} <span class="bar dim">[${asciiBar(n.morale,150,12)}]</span>${n.oilShort?' <span class="r">OIL SHORT</span>':''}</div>`;
  h+=`<div class="sec">ARMED FORCES</div>`;
  h+=`<div class="kv"><span>Infantry</span><span>${fmt(n.army.infantry)}</span></div>`;
  h+=`<div class="kv"><span>Tanks</span><span>${fmt(n.army.tank)}</span></div>`;
  h+=`<div class="kv"><span>Jet Fighters</span><span>${fmt(n.army.jet)}</span></div>`;
  h+=`<div class="kv"><span>Spies</span><span>${fmt(n.army.spy)}</span></div>`;
  h+=`<div class="kv"><span>SCUD Missiles</span><span>${fmt(n.army.scud)}</span></div>`;
  h+=`<div class="kv"><span>☢ Warheads</span><span>${fmt(n.army.warhead)}</span></div>`;
  h+=`<div class="kv dim"><span>Troop capacity</span><span>${fmt(troopCnt(n))}/${fmt(troopCap(n))}</span></div>`;
  h+=`<div class="kv dim"><span>Attack / Defense</span><span>${fmt(atkPower(n,n.army))} / ${fmt(defPower(n))}</span></div>`;
  h+=`<div class="sec">STRUCTURES</div>`;
  for(const k in n.b) h+=`<div class="kv"><span>${CONFIG.buildings[k].i} ${CONFIG.buildings[k].n}</span><span>${n.b[k]}</span></div>`;
  if(hasTech(n,'nuclearPhysics')){
    h+=`<div class="sec">☢ NUCLEAR PROGRAM</div>`;
    h+=`<div class="dim">[${asciiBar(n.nukeProg,CONFIG.warhead.researchNeeded,12)}] ${n.nukeProg}/${CONFIG.warhead.researchNeeded}</div>`;
  }
  $('stats').innerHTML=h;
}

function renderCmd(){
  $('cmdbar').innerHTML=
    `<span>ACTIONS <span class="bar">[${asciiBar(G.actions,CONFIG.actionsPerTurn,10)}]</span> <b>${G.actions}/${CONFIG.actionsPerTurn}</b></span>`+
    `<button class="btn" data-a="collect" ${G.actions<1?'disabled':''}>COLLECT ▸1</button>`+
    `<button class="btn warn" data-a="endTurn">END TURN ⏎</button>`;
}

function renderTabs(){
  const tabs=[['build','BUILD'],['train','TRAIN'],['attack','ATTACK'],['spy','SPY'],['tech','TECH'],['diplo','DIPLO']];
  $('tabs').innerHTML=tabs.map(([k,l])=>
    `<button class="tab${UI.tab===k?' on':''}" data-a="tab" data-p="${k}">[${l}]</button>`).join('');
}

function intelStr(t){
  const fresh = P().intel[t.id]!==undefined && (G.turn-P().intel[t.id])<=5;
  if(!fresh) return `<span class="muted">army ??? · gold ??? · bldgs ??? <span class="dim">(run INTEL)</span></span>`;
  return `<span class="c">army ${fmt(troopCnt(t))} · gold ${fmt(t.res.gold)} · bldgs ${totalBuildings(t)} · spies ${fmt(t.army.spy)}</span>`;
}
function targetsOf(){ return G.nations.filter(t=>!t.isPlayer&&t.alive); }

function renderTabContent(){
  const me=P(); let h='';
  if(UI.tab==='build'){
    h+=`<div class="sec">CONSTRUCT — 1 action each</div>`;
    for(const k in CONFIG.buildings){
      const b=CONFIG.buildings[k], lock=b.req&&!hasTech(me,b.req);
      h+=`<div class="row"><span class="grow">${b.i} <b>${b.n}</b> <span class="dim">(${me.b[k]})</span><br><span class="muted">${b.d}${lock?' — <span class="r">requires Nuclear Physics</span>':''}</span></span>`+
         `<span class="dim">${fmt(b.g)}💰 ${b.ind}⚙️</span>`+
         `<button class="btn" data-a="build" data-p="${k}" ${(!buildCostOk(me,k)||G.actions<1)?'disabled':''}>BUILD</button></div>`;
    }
  }
  else if(UI.tab==='train'){
    h+=`<div class="sec">TRAIN — 1 action per batch · capacity ${fmt(troopCnt(me))}/${fmt(troopCap(me))}</div>`;
    for(const k in CONFIG.units){
      const u=CONFIG.units[k];
      h+=`<div class="row"><span class="grow"><b>${u.n}</b> <span class="dim">(own ${fmt(me.army[k])})</span><br><span class="muted">${u.atk?`atk ${u.atk} / def ${u.def}`:k==='spy'?'covert operations':'destroys enemy buildings'}</span></span>`+
         `<span class="dim">${fmt(unitGoldCost(me,k))}💰 ${u.f*u.batch}🌾</span>`+
         `<button class="btn" data-a="train" data-p="${k}" ${(!trainCostOk(me,k)||G.actions<1)?'disabled':''}>TRAIN ×${u.batch}</button></div>`;
    }
  }
  else if(UI.tab==='attack'){
    const t=UI.attackTarget&&byId(UI.attackTarget);
    if(!t||!t.alive){
      h+=`<div class="sec">SELECT TARGET — attack costs 2 actions</div>`;
      for(const x of targetsOf()){
        const r=rel(me,x), block=['alliance','vassal'].includes(r);
        h+=`<div class="row"><span class="grow">${fb(x).flag} <b>${nm(x)}</b> <span class="dim">#${rankOf(x)}</span> ${REL_ICON[r]||''}<br>${intelStr(x)}</span>`+
           `<button class="btn warn" data-a="target" data-p="${x.id}" ${block?'disabled':''}>${block?(r==='vassal'?'VASSAL':'ALLY'):'ENGAGE ▸'}</button></div>`;
      }
      if(!targetsOf().length) h+=`<div class="muted">No nations left to attack. You are alone among the ruins.</div>`;
    } else {
      h+=`<div class="sec">OFFENSIVE vs ${nm(t).toUpperCase()}</div>`;
      h+=`<div class="row"><span class="grow">${fb(t).flag} <b>${nm(t)}</b> — ${intelStr(t)}</span><button class="btn" data-a="back">◂ BACK</button></div>`;
      h+=`<div class="row"><span class="grow">Ground assault <span class="dim">(▸2 actions — commit % of army)</span></span>`+
         [25,50,75,100].map(p=>`<button class="btn warn" data-a="attack" data-p="${p}" ${G.actions<2?'disabled':''}>${p}%</button>`).join('')+`</div>`;
      h+=`<div class="row"><span class="grow">🚀 SCUD strike <span class="dim">(▸1 action, consumes 1 missile · own ${me.army.scud})</span></span>`+
         `<button class="btn warn" data-a="scud" ${(me.army.scud<1||G.actions<1)?'disabled':''}>LAUNCH</button></div>`;
      const canNuke=me.army.warhead>0&&hasTech(me,'icbm');
      h+=`<div class="row"><span class="grow">☢ NUCLEAR STRIKE <span class="dim">(▸2 actions${canNuke?'':' — needs warhead + ICBM Program'})</span></span>`+
         `<button class="btn warn" data-a="nuke" ${(!canNuke||G.actions<2)?'disabled':''}>☢ DEPLOY</button></div>`;
    }
  }
  else if(UI.tab==='spy'){
    h+=`<div class="sec">COVERT OPS — 1 action · network: ${fmt(me.army.spy)} spies</div>`;
    for(const x of targetsOf()){
      h+=`<div class="row"><span class="grow">${fb(x).flag} <b>${nm(x)}</b><br>${intelStr(x)}</span>`+
         `<button class="btn cy" data-a="spy" data-p="${x.id}" data-q="steal" ${G.actions<1?'disabled':''}>STEAL</button>`+
         `<button class="btn cy" data-a="spy" data-p="${x.id}" data-q="sabotage" ${G.actions<1?'disabled':''}>SABOTAGE</button>`+
         `<button class="btn cy" data-a="spy" data-p="${x.id}" data-q="intel" ${G.actions<1?'disabled':''}>INTEL</button></div>`;
    }
  }
  else if(UI.tab==='tech'){
    h+=`<div class="sec">TECH TREE — 1 action each${me.b.lab<1?' · <span class="r">build a Research Lab first</span>':''}</div>`;
    const av=availTechs(me);
    for(const t of CONFIG.techs){
      const done=hasTech(me,t.id), can=av.includes(t)&&me.res.gold>=t.g;
      let st;
      if(done) st=`<span class="g">[RESEARCHED]</span>`;
      else if(av.includes(t)) st=`<button class="btn" data-a="tech" data-p="${t.id}" ${(!can||G.actions<1)?'disabled':''}>RESEARCH ${fmt(t.g)}💰</button>`;
      else st=`<span class="muted">[LOCKED]</span>`;
      h+=`<div class="row"><span class="grow"><span class="dim">T${t.tier}</span> <b>${t.n}</b><br><span class="muted">${t.d}</span></span>${st}</div>`;
    }
    h+=`<div class="sec">☢ MANHATTAN-DO-MAL PROJECT</div>`;
    const W=CONFIG.warhead, phys=hasTech(me,'nuclearPhysics'), fac=me.b.nuclearFacility>0;
    h+=`<div class="muted">1. Nuclear Physics ${phys?'<span class="g">✔</span>':'✘'} → 2. Nuclear Facility ${fac?'<span class="g">✔</span>':'✘'} → 3. Research ×${W.researchNeeded} → 4. Assemble → 5. ICBM → 6. Deploy as #1 power = <b>VICTORY</b></div>`;
    h+=`<div class="row"><span class="grow">Warhead research <span class="dim">[${asciiBar(me.nukeProg,W.researchNeeded,14)}] ${me.nukeProg}/${W.researchNeeded} (+1 passive/turn with facility)</span></span>`+
       `<button class="btn" data-a="nukeAdv" ${(!phys||!fac||me.nukeProg>=W.researchNeeded||G.actions<1)?'disabled':''}>ADVANCE +2</button></div>`;
    h+=`<div class="row"><span class="grow">Assemble warhead <span class="dim">${fmt(W.g)}💰 + ${W.oil}🛢️ · own: ${me.army.warhead}</span></span>`+
       `<button class="btn warn" data-a="assemble" ${(me.nukeProg<W.researchNeeded||me.res.gold<W.g||me.res.oil<W.oil||G.actions<1)?'disabled':''}>ASSEMBLE</button></div>`;
  }
  else if(UI.tab==='diplo'){
    h+=`<div class="sec">DIPLOMACY — 1 action each</div>`;
    for(const x of targetsOf()){
      const r=rel(me,x);
      let btns='';
      if(r==='peace') btns=`<button class="btn" data-a="diplo" data-p="${x.id}" data-q="ally" ${G.actions<1?'disabled':''}>PROPOSE ALLIANCE</button>`+
                           `<button class="btn warn" data-a="diplo" data-p="${x.id}" data-q="war" ${G.actions<1?'disabled':''}>DECLARE WAR</button>`;
      else if(r==='war'){
        const canV=score(x)<score(me)*0.25;
        btns=`<button class="btn" data-a="diplo" data-p="${x.id}" data-q="peace" ${G.actions<1?'disabled':''}>OFFER PEACE</button>`+
             `<button class="btn warn" data-a="diplo" data-p="${x.id}" data-q="vassal" ${(!canV||G.actions<1)?'disabled':''} title="enemy must be below 25% of your score">VASSALIZE</button>`;
      }
      else if(r==='alliance') btns=`<button class="btn warn" data-a="diplo" data-p="${x.id}" data-q="break" ${G.actions<1?'disabled':''}>BREAK PACT</button>`;
      else if(r==='vassal') btns=`<span class="g">pays you tribute ♟</span>`;
      h+=`<div class="row"><span class="grow">${fb(x).flag} <b>${nm(x)}</b> <span class="v">${REL_ICON[r]} ${r.toUpperCase()}</span> <span class="dim">${x.personality||''}</span></span>${btns}</div>`;
    }
    h+=`<div class="muted" style="margin-top:8px">Domination victory: control 4 of 6 nations (you + vassals + allies).</div>`;
  }
  $('tabContent').innerHTML=h;
}

function renderLog(){
  $('log').innerHTML=G.log.map(e=>
    `<div class="le ${e.type}"><span class="tt">[T${e.t}]</span>${e.text}</div>`).join('');
}

function renderRank(){
  const alive=G.nations.filter(n=>n.alive).sort((a,b)=>score(b)-score(a));
  const dead=G.nations.filter(n=>!n.alive);
  let h='';
  alive.forEach((n,i)=>{
    const r=n.isPlayer?'':REL_ICON[rel(P(),n)]||'';
    h+=`<div class="rrow${n.isPlayer?' me':''}"><span class="pos">#${i+1}</span>`+
       `<span class="nn">${fb(n).flag} ${nm(n)}${n.isPlayer?' (YOU)':''} ${n.isPlayer?'':`<span class="v">${r}</span>`}</span>`+
       `<span class="sc">${fmt(score(n))}</span></div>`;
  });
  dead.forEach(n=>{ h+=`<div class="rrow dead"><span class="pos">☠</span><span class="nn">${nm(n)}</span><span class="sc">FALLEN</span></div>`; });
  h+=`<div class="sec">SCORE FORMULA</div><div class="muted" style="font-size:12px">gold + pop×2 + army×3<br>+ buildings×500 + techs×1000</div>`;
  if(G.coalition) h+=`<div class="r" style="margin-top:8px">⚠ COALITION AGAINST YOU ACTIVE</div>`;
  $('rank').innerHTML=h;
}

/* ---------- overlays ---------- */
function renderFactionOverlay(show){
  const o=$('factionOverlay');
  o.classList.toggle('hidden',!show);
  if(!show) return;
  $('overOverlay').classList.add('hidden');
  let cards='';
  for(const k in CONFIG.factions){
    const f=CONFIG.factions[k];
    cards+=`<button class="fcard" data-a="pickFaction" data-p="${k}"><b>${f.flag} ${f.n}</b><br><span class="g">${f.bonus}</span><br><span class="muted">rogue state · UN-sanctioned</span></button>`;
  }
  o.innerHTML=`<div class="obox">
<pre>
╔══════════════════════════════════════════════════╗
║   E I X O   D O   M A L   ·   2 0 0 3   M M O    ║
║   text-only world domination terminal            ║
╚══════════════════════════════════════════════════╝
</pre>
<div class="muted">Six rogue nations. One throne. Build, train, spy, invade — and reach the bomb first.
Win by detonating a warhead as the world's #1 power, or by bending 4 of 6 nations to your will.</div>
<div class="sec">SELECT YOUR NATION</div>
<div class="fgrid">${cards}</div>
</div>`;
}
function renderOver(){
  const o=$('overOverlay');
  if(!G.over){ o.classList.add('hidden'); return; }
  o.classList.remove('hidden');
  const R=G.result, rows=G.nations.slice().sort((a,b)=>score(b)-score(a))
    .map((n,i)=>`<div class="rrow${n.isPlayer?' me':''}${n.alive?'':' dead'}"><span class="pos">#${i+1}</span><span class="nn">${fb(n).flag} ${nm(n)}${n.isPlayer?' (YOU)':''}</span><span class="sc">${n.alive?fmt(score(n)):'FALLEN'}</span></div>`).join('');
  o.innerHTML=`<div class="obox">
<pre>${R.win?
`╔═══════════════════════════════════╗
║   ★ ★ ★   V I C T O R Y   ★ ★ ★   ║
╚═══════════════════════════════════╝`:
`╔═══════════════════════════════════╗
║   ☠ ☠ ☠   D E F E A T   ☠ ☠ ☠     ║
╚═══════════════════════════════════╝`}</pre>
<div class="${R.win?'g':'r'}" style="margin-bottom:10px">${R.msg}</div>
<div class="muted">Survived ${G.turn} turns.</div>
<div class="sec">FINAL RANKING</div>${rows}
<div style="margin-top:14px"><button class="btn" data-a="newGame">▸ NEW GAME</button></div>
</div>`;
}

/* ---------- boot flavor: staggered teletype lines at game start ---------- */
function bootSequence(){
  const myG=G;
  CONFIG.bootLines.forEach((line,i)=>{
    setTimeout(()=>{ if(G===myG&&!G.over){ log('sys',line); renderLog(); } }, 250+i*420);
  });
}

/* =====================================================================
   Layer 8: wiring — one delegated click listener + Konami cheat
   ===================================================================== */
document.body.addEventListener('click',e=>{
  const el=e.target.closest('[data-a]');
  if(!el||el.disabled) return;
  const fn=H[el.dataset.a];
  if(fn) fn(el.dataset.p,el.dataset.q);
});

/* Konami code: ↑↑↓↓←→←→BA → +9999 gold */
const KONAMI=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
let kbuf=[];
document.addEventListener('keydown',e=>{
  kbuf.push(e.key.length===1?e.key.toLowerCase():e.key);
  if(kbuf.length>KONAMI.length) kbuf.shift();
  if(G&&G.started&&!G.over&&kbuf.join(',')===KONAMI.join(',')){
    P().res.gold+=9999;
    log('nuke','💾 CHEAT ACCEPTED: a mysterious benefactor wired you 9,999 gold.');
    render();
  }
  if(e.key==='Enter'&&G&&G.started&&!G.over&&!e.repeat){
    const tag=(e.target&&e.target.tagName)||'';
    if(tag!=='BUTTON'&&tag!=='INPUT') endTurn();
  }
});

render();   // first paint → faction select
</script>
