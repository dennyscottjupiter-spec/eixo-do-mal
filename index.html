<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EIXO DO MAL — World Domination Terminal</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div id="crt" aria-hidden="true"></div>
<header id="topbar">
  <div id="defcon">
  <button class="btn" data-a="menu" title="Open game menu: save, load, restart, resign, help">☰ MENU</button>
  <span id="defcon-inner"></span>
  <button class="btn cy" data-a="help" title="How to play — quick rules and tips">❔ HELP</button>
</div>
  <div id="hud"></div>
</header>
<main id="app">
  <section class="panel" id="centerPanel">
    <div id="cmdbar"></div>
    <nav id="tabs" aria-label="Actions"></nav>
    <div id="tabContent"></div>
    <h2 class="logTitle">EVENT LOG</h2>
    <div id="log" aria-live="polite"></div>
  </section>
  <section class="panel" id="rightPanel">
    <h2>WORLD RANKING</h2>
    <div id="rank"></div>
    <div class="panel-sub">NATION DETAIL</div>
    <div id="detail"></div>
  </section>
</main>
<div id="factionOverlay" class="overlay"></div>
<div id="overOverlay" class="overlay hidden"></div>
<div id="menuOverlay" class="overlay hidden"></div>
<div id="helpOverlay" class="overlay hidden"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/twemoji.min.js" crossorigin="anonymous"></script>
<script src="./game.js"></script>
</body>
</html>
