<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>EIXO DO MAL — World Domination Terminal</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div id="crt" aria-hidden="true"></div>
<header id="topbar">
  <div id="defcon">
  <button class="btn" data-a="menu" title="Open game menu: save, load, restart, resign, help">☰ MENU</button>
  <span id="defcon-inner"></span>
  <button class="btn cy" data-a="help" title="How to play — quick rules and tips">❔ HELP</button>
  <button class="btn cy" data-a="keys" title="Keyboard shortcuts reference">⌨ KEYS</button>
</div>
  <div id="hud"></div>
</header>
<main id="app">
  <section class="panel" id="centerPanel">
    <div id="cmdbar"></div>
    <nav id="tabs" aria-label="Actions"></nav>
    <div id="tabContent"></div>
    <h2 class="logTitle" title="A real-time feed of everything happening in the game — your actions, rival moves, wars, spy ops, diplomacy, economy alerts, and nuclear events. Most recent event is always at the top. Color key: green=economy, red=war, cyan=spy, purple=diplomacy, gold=nuclear, grey=system.">EVENT LOG</h2>
    <div class="tv-frame">
      <div id="log" class="tv-screen" aria-live="polite"></div>
    </div>
  </section>
  <section class="panel" id="rightPanel">
    <h2 title="All nations ranked by NETWORTH — your total power score (wealth + people + army + land + buildings + tech − debt). This is the winning scoreboard: ranked #1 AND controlling 4 of 6 nations (with at least 1 vassal) is the Domination victory condition. Watch who is rising — they are your biggest threat.">WORLD RANKING</h2>
    <div id="rank"></div>
    <div class="panel-sub" title="Your nation's live military and infrastructure snapshot — updates every action. Check ARMED FORCES before attacking to know your attack/defense power, and STRUCTURES to plan your next build.">NATION DETAIL</div>
    <div id="detail"></div>
  </section>
</main>
<div id="factionOverlay" class="overlay"></div>
<div id="overOverlay" class="overlay hidden"></div>
<div id="menuOverlay" class="overlay hidden"></div>
<div id="helpOverlay" class="overlay hidden"></div>
<div id="keysOverlay" class="overlay hidden"></div>
<div id="firstMovesOverlay" class="overlay hidden"></div>
<div id="statsOverlay" class="overlay hidden"></div>
<div id="broadcastOverlay" class="overlay hidden"></div>
<div id="lobbyOverlay" class="overlay hidden"></div>
<div id="blastOverlay" class="hidden"></div>
<!-- Firebase Realtime Database (official Google CDN) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script src="./config.js"></script>
<script src="./engine.js"></script>
<script src="./render.js"></script>
<script src="./screens.js"></script>
<script src="./multiplayer.js"></script>
</body>
</html>
